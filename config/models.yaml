# LLM Provider Configuration
# ==========================
# ACTIVE_PROVIDER: gemini (cloud) | local (cluster)
# ACTIVE_PROVIDER env var overrides this.

active_provider: gemini

providers:
  gemini:
    platform: GEMINI
    model: gemini-2.0-flash
    temperature: 0.7
    max_tokens: 4096
    api_key_env: GOOGLE_API_KEY

  local:
    active_model: med42_8b
    default_params:
      temperature: 0.7
      max_new_tokens: 2048
      do_sample: true
      top_p: 0.95
      repetition_penalty: 1.1

    models:
      biomistral_7b:
        repo_id: BioMistral/BioMistral-7B
        load_in_4bit: true
        device_map: auto
        torch_dtype: bfloat16
        bnb_4bit_compute_dtype: bfloat16
        bnb_4bit_quant_type: nf4
        use_double_quant: true

      med42_8b:
        repo_id: m42-health/med42-v2-8B
        load_in_4bit: true
        device_map: auto
        torch_dtype: bfloat16
        bnb_4bit_compute_dtype: bfloat16
        bnb_4bit_quant_type: nf4
        use_double_quant: true

      meditron_70b:
        repo_id: epfl-llm/meditron-70b
        load_in_4bit: true
        device_map: auto
        torch_dtype: bfloat16
        bnb_4bit_compute_dtype: bfloat16
        bnb_4bit_quant_type: nf4
        use_double_quant: true

      clinical_camel_70b:
        repo_id: wanglab/ClinicalCamel-70B
        load_in_4bit: true
        device_map: auto
        torch_dtype: bfloat16
        bnb_4bit_compute_dtype: bfloat16
        bnb_4bit_quant_type: nf4
        use_double_quant: true

      openbiollm_70b:
        repo_id: aaditya/Llama3-OpenBioLLM-70B
        load_in_4bit: true
        device_map: auto
        torch_dtype: bfloat16
        bnb_4bit_compute_dtype: bfloat16
        bnb_4bit_quant_type: nf4
        use_double_quant: true
