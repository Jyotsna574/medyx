# MedYX Environment - MAS Diagnosis Pipeline
# ===========================================
# Usage:
#   conda env create -f environment.yml
#   conda activate medyx

name: medyx
channels:
  - pytorch
  - conda-forge
  - defaults

dependencies:
  - python=3.10

  # PyTorch (optional for GPU)
  - pytorch>=2.0.0
  - torchvision>=0.15.0

  # Scientific
  - numpy>=1.24.0,<2.0.0
  - scipy>=1.11.0
  - scikit-image>=0.22.0
  - pillow>=10.0.0
  - pyyaml>=6.0.0
  - tqdm>=4.65.0

  - pip:
      - pydantic>=2.5.0
      - pydantic-settings>=2.1.0
      - camel-ai>=0.2.85
      - transformers>=4.40.0
      - accelerate>=0.30.0
      - bitsandbytes>=0.43.0
      - loguru>=0.7.0
      - python-dotenv>=1.0.0
