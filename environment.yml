# MedSAM Environment Configuration
# ====================================
# Production environment for MedSAM medical image segmentation
# Using bowang-lab/MedSAM (Nature Communications 2024)
# Compatible with CUDA 12.x
#
# Usage:
#   conda env create -f environment.yml
#   conda activate medsam
#
# After conda env creation, install MedSAM:
#   git clone https://github.com/bowang-lab/MedSAM
#   cd MedSAM && pip install -e .
#   cd .. && bash download_ckpts.sh

name: medsam
channels:
  - pytorch
  - nvidia
  - conda-forge
  - defaults

dependencies:
  # Python version (MedSAM recommends 3.10)
  - python=3.10

  # PyTorch ecosystem with CUDA 12.4
  - pytorch>=2.0.0
  - torchvision>=0.15.0
  - pytorch-cuda=12.4

  # Scientific computing
  - numpy>=1.24.0,<2.0.0
  - scipy>=1.11.0
  - scikit-image>=0.22.0
  - scikit-learn>=1.3.0

  # Image processing
  - pillow>=10.0.0
  - opencv>=4.8.0
  - imageio>=2.31.0

  # Medical imaging
  - pydicom>=2.4.0
  - nibabel>=5.1.0
  - simpleitk>=2.3.0

  # Visualization
  - matplotlib>=3.7.0

  # Utilities
  - tqdm>=4.65.0
  - pyyaml>=6.0.0
  - requests>=2.31.0

  # Development
  - pip>=23.0

  # Pip packages (not available in conda or need specific versions)
  - pip:
      # MedSAM is installed separately from GitHub:
      #   git clone https://github.com/bowang-lab/MedSAM && cd MedSAM && pip install -e .
      # It includes segment_anything module

      # MedSAM/medical imaging dependencies
      - monai>=1.3.0
      - connected-components-3d>=3.12.0

      # HTTP/API utilities
      - httpx>=0.25.0
      - aiohttp>=3.9.0

      # Hugging Face for model downloads
      - huggingface-hub>=0.20.0

      # Geometric analysis
      - shapely>=2.0.0

      # Production dependencies (from existing requirements.txt)
      - pydantic>=2.5.0
      - pydantic-settings>=2.1.0
